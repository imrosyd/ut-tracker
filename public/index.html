<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker Belajar UT</title>
    <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./assets/css/tailwind.build.css">
    <link rel="stylesheet" href="./assets/css/styles.css">
    <script src="./assets/js/theme-init.js"></script>
    <script src="./assets/js/app.js" defer></script>
</head>
<body class="bg-slate-100 dark:bg-slate-950 text-slate-800 dark:text-slate-200 transition-colors duration-300 min-h-screen">

    <div class="container mx-auto p-4 md:p-8 max-w-5xl">
        
        <header class="flex justify-between items-center mb-8">
            <div class="text-left">
                <h1 class="text-3xl md:text-4xl font-bold text-slate-900 dark:text-white">Tracker Belajar UT</h1>
                <p class="mt-1 text-slate-500 dark:text-slate-400">Selamat datang, Mahasiswa Universitas Terbuka!</p>
            </div>
            <button id="theme-toggle" class="relative w-10 h-10 flex items-center justify-center rounded-full text-slate-500 dark:text-slate-400 hover:bg-slate-200 dark:hover:bg-slate-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-100 dark:focus:ring-offset-slate-900 focus:ring-blue-500">
                <span class="sr-only">Toggle tema</span>
                <svg class="h-6 w-6 theme-icon sun" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" /></svg>
                <svg class="h-6 w-6 theme-icon moon absolute" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" /></svg>
            </button>
        </header>

        <div class="lg:grid lg:grid-cols-[260px,1fr] lg:gap-8">
            <aside class="mb-10 lg:mb-0 lg:sticky lg:top-8 lg:max-h-[calc(100vh-5rem)] lg:overflow-auto">
                <div class="bg-white dark:bg-slate-900/80 p-6 rounded-2xl border border-slate-200/70 dark:border-slate-700/60 shadow-sm">
                    <h2 class="text-sm font-semibold uppercase tracking-wide text-slate-500 dark:text-slate-400">Navigator</h2>
                    <p class="mt-2 text-xs text-slate-500 dark:text-slate-400">Pilih mata kuliah atau kategori untuk ditampilkan.</p>
                    <div id="category-filter" class="mt-4 flex flex-wrap gap-2"></div>
                    <nav id="course-nav" aria-label="Navigator mata kuliah" class="mt-4 flex flex-col gap-2 text-sm"></nav>
                </div>
            </aside>
            <main class="space-y-8">
                <section class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div class="bg-white dark:bg-slate-900/80 p-5 rounded-2xl border border-slate-200/70 dark:border-slate-700/60 text-center shadow-sm">
                        <h3 class="text-sm font-medium text-slate-500 dark:text-slate-400">Total Mata Kuliah</h3>
                        <p id="total-mk" class="text-2xl font-bold text-slate-900 dark:text-white">0</p>
                    </div>
                    <div class="bg-white dark:bg-slate-900/80 p-5 rounded-2xl border border-slate-200/70 dark:border-slate-700/60 text-center shadow-sm">
                        <h3 class="text-sm font-medium text-slate-500 dark:text-slate-400">Total SKS</h3>
                        <p id="total-sks" class="text-2xl font-bold text-slate-900 dark:text-white">0</p>
                    </div>
                    <div class="bg-white dark:bg-slate-900/80 p-5 rounded-2xl border border-slate-200/70 dark:border-slate-700/60 text-center shadow-sm">
                        <h3 class="text-sm font-medium text-slate-500 dark:text-slate-400">Indeks Prestasi (IP)</h3>
                        <p id="total-ip" class="text-2xl font-bold text-slate-900 dark:text-white">0.00</p>
                    </div>
                </section>

                <section class="bg-white dark:bg-slate-900/80 p-6 rounded-2xl border border-slate-200/70 dark:border-slate-700/60 shadow-sm form-card">
                    <h2 class="text-xl font-bold mb-4 text-slate-900 dark:text-white">Tambah Mata Kuliah Baru</h2>
                    <div class="grid grid-cols-1 md:grid-cols-6 gap-4">
                        <div class="md:col-span-3">
                            <label for="mkName" class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">Kode & Nama Mata Kuliah</label>
                            <input type="text" id="mkName" placeholder="" class="w-full px-3 py-2 bg-transparent border border-slate-300 dark:border-slate-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="md:col-span-1">
                            <label for="mkSks" class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">SKS</label>
                            <input type="number" id="mkSks" placeholder="" class="w-full px-3 py-2 bg-transparent border border-slate-300 dark:border-slate-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                        </div>
                        <div class="md:col-span-2">
                            <label for="mkScheme" class="block text-sm font-medium text-slate-600 dark:text-slate-300 mb-1">Skema Penilaian</label>
                            <select id="mkScheme" class="w-full px-3 py-2 bg-white dark:bg-slate-800 border border-slate-300 dark:border-slate-600 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                                <option value="Tuton">Tutorial Online</option>
                                <option value="Tuweb">Tutorial Webinar</option>
                                <option value="TTM">Tutorial Tatap Muka</option>
                                <option value="Berpraktik">Berpraktik</option>
                                <option value="Berpraktikum">Berpraktikum</option>
                                <option value="Praktik">Praktik</option>
                                <option value="Praktikum">Praktikum</option>
                                <option value="Hanya UAS">Hanya UAS</option>
                            </select>
                        </div>
                    </div>
                    <button onclick="addCourse()" class="mt-4 w-full md:w-auto bg-blue-600 text-white font-semibold py-2 px-4 rounded-md hover:bg-blue-700 dark:bg-blue-500 dark:hover:bg-blue-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-offset-slate-100 dark:focus:ring-offset-slate-800 focus:ring-blue-500 flex items-center justify-center gap-2 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" /></svg>
                        Tambahkan
                    </button>
                </section>

                <section>
                    <div id="courses-container" class="space-y-6"></div>
                </section>
            </main>
        </div>

        <footer class="mt-12 pt-8 border-t border-slate-200 dark:border-slate-700 text-center text-slate-500 dark:text-slate-400">
            <div class="social-links flex justify-center items-center gap-6">
                <a href="https://github.com/imrosyd" target="_blank" rel="noopener noreferrer" title="GitHub" class="hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
                    <span class="sr-only">GitHub</span>
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12 .5C5.73.5.5 5.74.5 12.02c0 5.1 3.29 9.41 7.86 10.94.58.11.79-.25.79-.55v-2.15c-3.2.7-3.88-1.54-3.88-1.54-.53-1.36-1.3-1.72-1.3-1.72-1.06-.73.08-.72.08-.72 1.17.08 1.78 1.2 1.78 1.2 1.04 1.77 2.73 1.26 3.39.96.1-.75.41-1.26.74-1.55-2.55-.29-5.23-1.28-5.23-5.7 0-1.26.45-2.29 1.19-3.1-.12-.29-.52-1.47.11-3.06 0 0 .97-.31 3.18 1.18a11.06 11.06 0 0 1 5.8 0c2.2-1.49 3.17-1.18 3.17-1.18.63 1.59.23 2.77.11 3.06.74.81 1.18 1.84 1.18 3.1 0 4.43-2.69 5.4-5.25 5.68.42.36.8 1.07.8 2.15v3.18c0 .3.2.66.8.55A10.52 10.52 0 0 0 23.5 12C23.5 5.74 18.27.5 12 .5Z"/>
                    </svg>
                </a>
                <a href="https://www.linkedin.com/in/imrosyd" target="_blank" rel="noopener noreferrer" title="LinkedIn" class="hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
                    <span class="sr-only">LinkedIn</span>
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M20.45 20.45h-3.55v-5.4c0-1.29-.02-2.95-1.8-2.95-1.81 0-2.09 1.42-2.09 2.87v5.48h-3.55V9h3.41v1.56h.05c.47-.89 1.62-1.82 3.33-1.82 3.56 0 4.21 2.34 4.21 5.39v6.32zM5.34 7.43a2.06 2.06 0 1 1 0-4.11 2.06 2.06 0 0 1 0 4.11zm1.78 13.02H3.55V9h3.57v11.45zM22.23 0H1.77C.79 0 0 .77 0 1.72v20.56C0 23.23.79 24 1.77 24h20.46c.98 0 1.77-.77 1.77-1.72V1.72C24 .77 23.21 0 22.23 0z"/>
                    </svg>
                </a>
                <a href="https://www.instagram.com/imrosyd" target="_blank" rel="noopener noreferrer" title="Instagram" class="hover:text-blue-500 dark:hover:text-blue-400 transition-colors">
                    <span class="sr-only">Instagram</span>
                    <svg class="h-6 w-6" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M7.5 2h9A5.5 5.5 0 0 1 22 7.5v9a5.5 5.5 0 0 1-5.5 5.5h-9A5.5 5.5 0 0 1 2 16.5v-9A5.5 5.5 0 0 1 7.5 2zm0 2A3.5 3.5 0 0 0 4 7.5v9A3.5 3.5 0 0 0 7.5 20h9a3.5 3.5 0 0 0 3.5-3.5v-9A3.5 3.5 0 0 0 16.5 4h-9zm4.5 3.25a5.25 5.25 0 1 1 0 10.5 5.25 5.25 0 0 1 0-10.5zm0 2a3.25 3.25 0 1 0 0 6.5 3.25 3.25 0 0 0 0-6.5zm5.75-.88a1.13 1.13 0 1 1-2.25 0 1.13 1.13 0 0 1 2.25 0z"/>
                    </svg>
                </a>
            </div>
            <p class="mt-4 text-sm">Dibuat dengan ❤️ oleh imrosyd</p>
        </footer>

    </div>
</body>
</html>
